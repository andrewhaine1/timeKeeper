<div class="page-header">
  <h1 class="page-title">Notes</h1>
  <button mat-raised-button color="primary" routerLink="/notes/new">
    <mat-icon>add</mat-icon>
    New Note
  </button>
</div>

@if (loading) {
  <div class="centered">
    <mat-spinner diameter="52" />
  </div>
} @else if (notes.length === 0) {
  <div class="empty-state">
    <mat-icon>sticky_note_2</mat-icon>
    <p>No notes yet. Click <strong>New Note</strong> to create one.</p>
  </div>
} @else {
  <div class="notes-grid">
    @for (note of notes; track note._id) {
      <mat-card>
        <mat-card-header>
          <mat-card-title class="note-title">{{ note.title }}</mat-card-title>
          <mat-card-subtitle>
            Updated {{ note.updatedAt | date : 'dd MMM yyyy, HH:mm' }}
          </mat-card-subtitle>
        </mat-card-header>

        @if (note.text) {
          <mat-card-content>
            <p class="note-text">{{ note.text }}</p>
          </mat-card-content>
        }

        <mat-divider />

        <mat-card-actions align="end">
          <button
            mat-icon-button
            [routerLink]="['/notes', note._id, 'edit']"
            matTooltip="Edit note"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            (click)="deleteNote(note)"
            matTooltip="Delete note"
          >
            <mat-icon>delete_outline</mat-icon>
          </button>
        </mat-card-actions>
      </mat-card>
    }
  </div>
}
