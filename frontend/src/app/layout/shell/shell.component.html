<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">schedule</mat-icon>
      <span class="app-name">TimeKeeper</span>
    </div>

    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/tasks"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        <mat-icon matListItemIcon>task_alt</mat-icon>
        <span matListItemTitle>Tasks</span>
      </a>
      <a
        mat-list-item
        routerLink="/notes"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        <mat-icon matListItemIcon>sticky_note_2</mat-icon>
        <span matListItemTitle>Notes</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">
      <span class="spacer"></span>
      <span class="username">{{ (auth.user$ | async)?.username }}</span>

      <button
        mat-icon-button
        (click)="theme.toggle()"
        [matTooltip]="(theme.dark$ | async) ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
      >
        <mat-icon>{{ (theme.dark$ | async) ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button mat-icon-button (click)="auth.logout()" matTooltip="Sign out">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
